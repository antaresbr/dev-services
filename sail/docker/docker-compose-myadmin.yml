services:

    myadmin:
        image: 'phpmyadmin'
        container_name: ${SAIL_SERVICE_MYADMIN}
        extra_hosts:
            - host.docker.internal:host-gateway
            - gateway.docker.internal:host-gateway
        ports:
            - '${MYADMIN_FORWARD_PORT}:80'
        environment:
            PMA_ARBITRARY: 1
            PMA_ABSOLUTE_URI: "${MYADMIN_ABSOLUTE_URI}"
        volumes:
            - ../../data/myadmin/phpmyadmin-local.ini:/usr/local/etc/php/conf.d/phpmyadmin-local.ini:ro
            - ../../data/myadmin/config.user.inc.php:/etc/phpmyadmin/config.user.inc.php:ro
        networks:
            - sail-services
